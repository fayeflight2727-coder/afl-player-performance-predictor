name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          ACTIONS_ALLOW_UNSECURE_NODE_VERSION: true
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # Step 2: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build the Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/afl-prediction:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/afl-prediction:${{ github.sha }} .

      # Step 4: Push the image to Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/afl-prediction:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/afl-prediction:${{ github.sha }}

      # Step 5: Smoke test
      - name: Smoke test
        run: |
          docker run -d -p 8000:8000 --name afl_test \
            -e MLFLOW_TRACKING_URI=http://localhost:5000 \
            ${{ secrets.DOCKER_USERNAME }}/afl-prediction:latest
          sleep 10
          curl --fail http://localhost:8000/health
          docker stop afl_test