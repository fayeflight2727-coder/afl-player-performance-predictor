version: "3.9"

services:

  # FastAPI prediction API
  api:
    build: .
    container_name: afl_api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped

  # MLflow tracking server
  mlflow:
    image: python:3.11-slim
    container_name: afl_mlflow
    command: >
      bash -c "pip install mlflow &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root ./mlruns"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

volumes:
  mlflow_data:
