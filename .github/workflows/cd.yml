name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub using secrets stored in GitHub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build the Docker image and tag it with the commit SHA
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/afl-prediction:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/afl-prediction:${{ github.sha }} .

      # Step 4: Push the image to Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/afl-prediction:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/afl-prediction:${{ github.sha }}

      # Step 5: Smoke test - retry until API responds or timeout after 60s
      - name: Smoke test
        run: |
          docker run -d -p 8000:8000 --name afl_test \
            -e MLFLOW_TRACKING_URI=http://localhost:5000 \
            ${{ secrets.DOCKER_USERNAME }}/afl-prediction:latest
          echo "Waiting for API to be ready..."
          for i in $(seq 1 12); do
            sleep 5
            echo "Attempt $i..."
            if curl --silent --fail http://localhost:8000/health; then
              echo "API is up!"
              docker stop afl_test
              exit 0
            fi
          done
          echo "API failed to start. Printing logs:"
          docker logs afl_test
          docker stop afl_test
          exit 1
