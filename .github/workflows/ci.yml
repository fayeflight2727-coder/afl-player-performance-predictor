name: CI Pipeline

# Triggers on every Pull Request to main
on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11 to match our Dockerfile
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install all dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      # Step 4: Run linting to catch syntax errors and bad formatting
      - name: Lint with flake8
        continue-on-error: true
        run: |
          pip install flake8
          flake8 src/ --max-line-length=100 --ignore=E501,W503

      # Step 5: Run unit tests
      - name: Run tests
        run: |
          pytest tests/ -v

      # Step 6: Verify Docker image builds correctly
      - name: Docker build check
        run: |
          docker build . -t afl-api-test